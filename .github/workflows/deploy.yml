name: Build & Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test -B -Dtest='!com.typingtutor.service.OtpServiceIntegrationTest'

      - name: Build JAR
        run: mvn package -DskipTests -B

      - name: Trigger Render deploy
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || true)
          echo "Render deploy hook responded: $code"
          if [ "$code" = "000" ] || [ "$code" = "" ]; then
            echo "::warning::Deploy hook unreachable (HTTP $code). Trigger deploy manually from Render dashboard."
          fi
        continue-on-error: true
