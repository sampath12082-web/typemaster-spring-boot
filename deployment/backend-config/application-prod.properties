# ============================================================
# TypeMaster — Production Profile (Oracle Cloud + PostgreSQL)
# Activated by: java -Dspring.profiles.active=prod -jar app.jar
# ============================================================

# --- PostgreSQL DataSource ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# --- Data seeding ---
spring.sql.init.mode=always
spring.sql.init.platform=postgresql

# --- H2 Console (DISABLED in prod) ---
spring.h2.console.enabled=false

# --- JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# --- CORS ---
app.cors.allowed-origins=${FRONTEND_URL}

# --- Email (Brevo SMTP) ---
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- Server ---
server.port=8080
server.address=127.0.0.1

# --- Logging ---
logging.level.com.typingtutor=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.file.name=/var/log/typemaster/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
