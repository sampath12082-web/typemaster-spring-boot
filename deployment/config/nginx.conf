# =============================================================
# Nginx Configuration — TypeMaster
# Reverse proxy for Spring Boot + serves React static files
# Replace YOUR_DOMAIN with your actual domain
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge (certbot will add HTTPS block automatically)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS after cert is obtained
    # Certbot adds this automatically; uncomment if doing manual setup:
    # return 301 https://$host$request_uri;

    # --- API reverse proxy ---
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Upload size limit (for certificate PDFs etc.)
        client_max_body_size 10M;
    }

    # --- H2 console (disabled in prod — block it) ---
    location /h2-console {
        return 403;
    }

    # --- React SPA static files ---
    root /opt/typemaster/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1000;
}

# HTTPS block — Certbot adds this automatically after: certbot --nginx -d YOUR_DOMAIN
# It will look like this (added by certbot):
#
# server {
#     listen 443 ssl;
#     server_name YOUR_DOMAIN;
#     ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#     ... (all the location blocks repeated here)
# }
