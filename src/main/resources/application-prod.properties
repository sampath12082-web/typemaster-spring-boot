# ============================================================
# PRODUCTION profile — activated by SPRING_PROFILES_ACTIVE=prod
# Overrides application.properties for production deployment.
# All secrets must be supplied as environment variables.
# ============================================================

# --- Database -----------------------------------------------
# Required: DB_URL, DB_USERNAME, DB_PASSWORD env vars
# DB_URL has no default in prod — fail fast if missing
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- CORS ---------------------------------------------------
# Set to your frontend URL (e.g. https://typemaster.app)
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:https://*.onrender.com}

# --- Logging ------------------------------------------------
logging.level.com.typingtutor=INFO
logging.level.org.springframework.security=WARN

# --- Email ----------------------------------------------------
# Explicit (redundant with the base default, kept here so it's unmissable): never expose OTP
# codes in API responses in production, regardless of mail configuration state.
app.dev-otp-enabled=false

# --- Hibernate DDL -------------------------------------------
# Override base 'update' — production schema changes must go through migrations
spring.jpa.hibernate.ddl-auto=validate

# --- Flyway ---------------------------------------------------
# Disabled until first real migration is needed. Existing prod schema
# was created by Hibernate ddl-auto and is validated above.
spring.flyway.enabled=false
