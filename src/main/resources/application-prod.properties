# ============================================================
# PRODUCTION profile — activated by SPRING_PROFILES_ACTIVE=prod
# All secrets must be supplied as environment variables.
# ============================================================

# --- Database (Supabase / any PostgreSQL) -------------------
# Set these env vars on Render:
#   DB_URL      = jdbc:postgresql://<host>:5432/<dbname>
#   DB_USERNAME = postgres  (or your Supabase user)
#   DB_PASSWORD = <your-db-password>
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Use PostgreSQL-compatible seed script
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-prod.sql
spring.jpa.defer-datasource-initialization=true

# --- Disable H2 console in production -----------------------
spring.h2.console.enabled=false

# --- JWT ----------------------------------------------------
# Set JWT_SECRET env var: a base64-encoded 256-bit random key
# Generate: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# --- Email --------------------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- CORS ---------------------------------------------------
# Set to your Render service URL (e.g. https://typemaster.onrender.com)
# Not needed when frontend is served from the same Spring Boot jar,
# but set it anyway in case you ever split them.
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:https://*.onrender.com}

# --- AI (optional) ------------------------------------------
app.ai.api-key=${AI_API_KEY:}
app.ai.api-url=https://api.anthropic.com/v1/messages
app.ai.model=claude-haiku-4-5-20251001

# --- Lesson / Exam thresholds (same as defaults) ------------
app.lesson.min-wpm-basic=20
app.lesson.min-wpm-intermediate=35
app.lesson.min-wpm-advanced=50
app.lesson.min-accuracy=85.0

app.placement.passage=The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump. The five boxing wizards jump quickly past the fence. Sphinx of black quartz, judge my vow right now. Crazy Fredrick bought many exquisite opal jewels.
app.placement.time-seconds=60

# --- Logging ------------------------------------------------
logging.level.com.typingtutor=INFO
logging.level.org.springframework.security=WARN
