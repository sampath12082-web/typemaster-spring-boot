spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/typingtutor}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-prod.sql
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Feature A: per-tier minimum passing thresholds
app.lesson.min-wpm-basic=20
app.lesson.min-wpm-intermediate=35
app.lesson.min-wpm-advanced=50
app.lesson.min-accuracy=85.0

# Feature B: placement test
app.placement.passage=The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump. The five boxing wizards jump quickly past the fence. Sphinx of black quartz, judge my vow right now. Crazy Fredrick bought many exquisite opal jewels.
app.placement.time-seconds=60

# Feature D: email (override via environment variables)
# yourtypemaster@gmail.com is the standard sender for OTPs and support — requires a Gmail
# "App Password" (Google Account > Security > App Passwords; only available with 2FA enabled
# on the account), NOT the regular account password. Set MAIL_PASSWORD to that app password.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:yourtypemaster@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# devOtp is only ever returned in the API response when this is explicitly true — set only in
# application-local.properties. Never tie this to whether mail happens to be configured (that
# would leak OTP codes in API responses if mail breaks in a non-local environment).
app.dev-otp-enabled=false

# Feature F: AI lesson generation (set AI_API_KEY env var to enable)
app.ai.api-key=${AI_API_KEY:}
app.ai.api-url=https://api.anthropic.com/v1/messages
app.ai.model=claude-haiku-4-5-20251001

# Flyway — baseline on existing DB, then manage future migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

logging.level.com.typingtutor=DEBUG
logging.level.org.springframework.security=INFO

# ── Performance metrics ──────────────────────────────────────────────────────
# RequestTimingFilter logs WARN when a request exceeds this threshold
app.perf.slow-request-threshold-ms=500
# PerformanceLoggingAspect logs WARN when a service method exceeds this threshold
app.perf.slow-service-threshold-ms=100
# Hibernate logs the SQL text of any query that takes longer than this (ms)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=500

# Actuator — expose only health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
